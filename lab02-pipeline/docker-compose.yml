###############################################################################
#  VulnCorp Lab 02 — Pipeline Profesional de Gestión de Vulnerabilidades
#  Curso MAR303 — Universidad Mayor — Profesor Tomás Vera — 2026
#
#  Este compose levanta las plataformas de gestión:
#    - OWASP Dependency-Track (SBOM analysis)
#    - DefectDojo (Vulnerability management)
#
#  Las herramientas CLI (Syft, Grype) se instalan en el host vía scripts.
#  Los SBOMs y reportes se generan contra las imágenes del Lab 01.
#
#  PUERTOS:
#    - Dependency-Track Frontend: 8083
#    - Dependency-Track API:      8084
#    - DefectDojo:                8085
#
#  Compatible con: AMD64 (Intel/AMD) y ARM64 (Apple Silicon M1/M2/M3/M4)
###############################################################################

services:

  # =========================================================================
  #  DEPENDENCY-TRACK — Plataforma de Análisis de SBOM
  # =========================================================================

  # --- Dependency-Track API Server ---
  # Motor principal que procesa SBOMs, analiza componentes y detecta
  # vulnerabilidades conocidas cruzando con NVD, OSS Index, etc.
  dtrack-apiserver:
    image: dependencytrack/apiserver:4.12.3
    container_name: vulncorp-dtrack-api
    hostname: dtrack-apiserver
    environment:
      # Reducir memoria para entorno de laboratorio
      - EXTRA_JAVA_OPTIONS=-Xmx2g
      # Habilitar CORS para el frontend
      - ALPINE_CORS_ENABLED=true
      - ALPINE_CORS_ALLOW_ORIGIN=*
      - ALPINE_CORS_ALLOW_METHODS=GET, POST, PUT, DELETE, OPTIONS
      - ALPINE_CORS_ALLOW_HEADERS=Origin, Content-Type, Authorization, X-Requested-With, Content-Length, Accept, Origin, X-Api-Key, X-Total-Count, *
      - ALPINE_CORS_EXPOSE_HEADERS=Origin, Content-Type, Authorization, X-Requested-With, Content-Length, Accept, Origin, X-Api-Key, X-Total-Count
      - ALPINE_CORS_ALLOW_CREDENTIALS=true
      - ALPINE_CORS_MAX_AGE=3600
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g
    ports:
      - "8084:8080"
    volumes:
      - dtrack_data:/data
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "sbom-analysis-platform"

  # --- Dependency-Track Frontend ---
  # Interfaz web para visualizar proyectos, componentes, vulnerabilidades
  # y políticas de la cadena de suministro de software.
  dtrack-frontend:
    image: dependencytrack/frontend:4.12.3
    container_name: vulncorp-dtrack-frontend
    hostname: dtrack-frontend
    environment:
      - API_BASE_URL=http://localhost:8084
    ports:
      - "8083:8080"
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "sbom-analysis-frontend"

  # =========================================================================
  #  DEFECTDOJO — Plataforma de Gestión de Vulnerabilidades
  # =========================================================================

  # --- PostgreSQL para DefectDojo ---
  defectdojo-postgres:
    image: postgres:16-alpine
    container_name: vulncorp-dd-postgres
    hostname: defectdojo-postgres
    environment:
      - POSTGRES_DB=defectdojo
      - POSTGRES_USER=defectdojo
      - POSTGRES_PASSWORD=defectdojo
    volumes:
      - dd_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defectdojo"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-database"

  # --- Redis para DefectDojo (Celery broker) ---
  defectdojo-redis:
    image: redis:7-alpine
    container_name: vulncorp-dd-redis
    hostname: defectdojo-redis
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-broker"

  # --- DefectDojo Initializer (solo primera ejecución) ---
  defectdojo-initializer:
    image: defectdojo/defectdojo-django:2.41.4
    container_name: vulncorp-dd-initializer
    hostname: defectdojo-initializer
    entrypoint: ["/wait-for-it.sh", "defectdojo-postgres:5432", "-t", "30", "--", "/entrypoint-initializer.sh"]
    environment: &dd_env
      DD_DATABASE_ENGINE: django.db.backends.postgresql
      DD_DATABASE_HOST: defectdojo-postgres
      DD_DATABASE_PORT: "5432"
      DD_DATABASE_NAME: defectdojo
      DD_DATABASE_USER: defectdojo
      DD_DATABASE_PASSWORD: defectdojo
      DD_SECRET_KEY: "vulncorp-lab-secret-key-2026-not-for-production"
      DD_CREDENTIAL_AES_256_KEY: "vulncorp-aes-key-2026-not-prod!"
      DD_CELERY_BROKER_URL: redis://defectdojo-redis:6379/0
      DD_ALLOWED_HOSTS: "*"
      DD_ADMIN_USER: admin
      DD_ADMIN_PASSWORD: VulnCorp2024!
      DD_ADMIN_MAIL: admin@vulncorp.local
      DD_ADMIN_FIRST_NAME: VulnCorp
      DD_ADMIN_LAST_NAME: Admin
      DD_INITIALIZE: "true"
      DD_SESSION_COOKIE_HTTPONLY: "True"
      DD_CSRF_COOKIE_HTTPONLY: "True"
      DD_SECURE_SSL_REDIRECT: "False"
      DD_PORT_SCAN_CONTACT_EMAIL: admin@vulncorp.local
      DD_PORT_SCAN_EXTERNAL_UNIT_EMAIL_LIST: "[]"
      DD_PORT_SCAN_RESULT_EMAIL_FROM: admin@vulncorp.local
      DD_SOCIAL_AUTH_SHOW_LOGIN_FORM: "True"
    depends_on:
      defectdojo-postgres:
        condition: service_healthy
      defectdojo-redis:
        condition: service_started
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-initializer"

  # --- DefectDojo uWSGI (Application Server) ---
  defectdojo-uwsgi:
    image: defectdojo/defectdojo-django:2.41.4
    container_name: vulncorp-dd-uwsgi
    hostname: defectdojo-uwsgi
    entrypoint: ["/wait-for-it.sh", "defectdojo-postgres:5432", "-t", "30", "--", "/entrypoint-uwsgi.sh"]
    environment:
      <<: *dd_env
      DD_INITIALIZE: "false"
    volumes:
      - dd_media:/app/media
    depends_on:
      defectdojo-initializer:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-app-server"

  # --- DefectDojo Celery Worker ---
  defectdojo-celeryworker:
    image: defectdojo/defectdojo-django:2.41.4
    container_name: vulncorp-dd-celeryworker
    hostname: defectdojo-celeryworker
    entrypoint: ["/wait-for-it.sh", "defectdojo-postgres:5432", "-t", "30", "--", "/entrypoint-celery-worker.sh"]
    environment:
      <<: *dd_env
      DD_INITIALIZE: "false"
    volumes:
      - dd_media:/app/media
    depends_on:
      defectdojo-initializer:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-celery-worker"

  # --- DefectDojo Celery Beat (scheduler) ---
  defectdojo-celerybeat:
    image: defectdojo/defectdojo-django:2.41.4
    container_name: vulncorp-dd-celerybeat
    hostname: defectdojo-celerybeat
    entrypoint: ["/wait-for-it.sh", "defectdojo-postgres:5432", "-t", "30", "--", "/entrypoint-celery-beat.sh"]
    environment:
      <<: *dd_env
      DD_INITIALIZE: "false"
    depends_on:
      defectdojo-initializer:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-celery-beat"

  # --- DefectDojo Nginx (Frontend / Reverse Proxy) ---
  defectdojo-nginx:
    image: defectdojo/defectdojo-nginx:2.41.4
    container_name: vulncorp-dd-nginx
    hostname: defectdojo-nginx
    environment:
      - NGINX_METRICS_ENABLED=false
    ports:
      - "8085:8080"
    depends_on:
      - defectdojo-uwsgi
    volumes:
      - dd_media:/usr/share/nginx/html/media
    restart: unless-stopped
    labels:
      vulncorp.lab: "02"
      vulncorp.role: "defectdojo-frontend"

# =============================================================================
#  VOLÚMENES
# =============================================================================
volumes:
  dtrack_data:
    driver: local
  dd_postgres_data:
    driver: local
  dd_media:
    driver: local
