###############################################################################
#  VulnCorp — Nginx Proxy Inverso para PetaShop
#  NOTA: Esta configuración es INTENCIONALMENTE INSEGURA para fines educativos
#
#  En un escenario real, Nginx sería el único punto de entrada a Internet.
#  Para el laboratorio, Nginx se expone en el puerto 8082 y PrestaShop
#  directamente en el puerto 8080 para evitar redirect loops.
###############################################################################

# Upstream hacia PrestaShop
upstream prestashop_backend {
    server prestashop:80;
}

server {
    listen 80;
    server_name localhost;

    # ⚠️ VULNERABILIDAD: Server tokens habilitados (Information Disclosure)
    server_tokens on;

    # ⚠️ VULNERABILIDAD: Sin headers de seguridad
    # Falta: X-Frame-Options, X-Content-Type-Options, CSP, HSTS

    # ⚠️ VULNERABILIDAD: Acceso al directorio de uploads sin restricción
    location /upload/ {
        proxy_pass http://prestashop_backend/upload/;
        autoindex on;
    }

    # ⚠️ VULNERABILIDAD: Exposición de archivos de configuración
    location ~ /\. {
        # Debería ser "deny all;" pero está permitido
    }

    # ⚠️ VULNERABILIDAD: Proxy sin rate limiting ni WAF
    location / {
        proxy_pass http://prestashop_backend;
        proxy_set_header Host localhost:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        # ⚠️ VULNERABILIDAD: Buffers grandes permiten ataques de smuggling
        proxy_buffer_size 256k;
        proxy_buffers 4 512k;
        proxy_busy_buffers_size 512k;
    }

    # ⚠️ VULNERABILIDAD: Página de status expuesta sin autenticación
    location /nginx_status {
        stub_status on;
        # Debería tener: allow 172.22.0.0/24; deny all;
    }

    # ⚠️ VULNERABILIDAD: Logs accesibles
    location /logs/ {
        alias /var/log/nginx/;
        autoindex on;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
